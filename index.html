 <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

    <div class="hero">

        <div class="overlay"></div>

        <div class="texto">
            <h1>Rafaella & Kevin</h1>
            <p>Clique para abrir</p>
        </div>

    </div>

    <div class="site">

        <section class="foto2">
            <div class="overlay2"></div>
        </section>

        <div class="conteudo">
            <p class="versiculo">
                "Assim, eles já não são dois, mas sim uma só carne. Portanto, o que Deus uniu, ninguém separe." Mateus 19:6
            </p>

            <div class="decoracao-flores">
              <img src="imagens/fotofloresatt.webp" class="flor-esquerda">

              <img src="imagens/fotofloresatt.webp" class="flor-direita">
       
            </div>

        </div>

       
          

      

        <div class="bencao">
            <p class="frase-bencao">
                Com a bênção de nossos pais
            </p>

                <div class="lado">
                    <p>Warlen e Rosimar</p>
                </div>

                <div class="lado">
                    <p>Ricardo e Luiza</p>
                </div>

            </div>

        </div>

        <h2 class="nomes-noivos">
            Rafaella <br>& <br> Kevin
        </h2>

        <section class="chamada-casamento">
            <div class="retangulo">
                <p>Convidamos você para o nosso casamento!</p>
            </div>
        </section>

        <div class="fotodois">
            <div class="overlay-meio"></div>
            <img src="imagens/foto3.jpg" class="fotomeio">
        </div>

        <div class="frase-data">
          <p>A realizar-se em...</p>
